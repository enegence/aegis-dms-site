name: CI

on:
  push:
    branches: [main, phase-5]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + integration tests ────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_site_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_site_test
      SESSION_SECRET: test-session-secret-at-least-32-chars-long
      CSRF_SECRET: test-csrf-secret-at-least-32-chars-long
      ENCRYPTION_KEY: test-encryption-key-32-bytes-long-!!
      JWT_SECRET: test-jwt-secret-at-least-32-chars-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_site_test

      - name: Build
        run: npm run build

      - name: Unit & integration tests
        run: npm test

  # ── E2E tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_site_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_site_e2e
      SESSION_SECRET: e2e-session-secret-at-least-32-chars-long
      CSRF_SECRET: e2e-csrf-secret-at-least-32-chars-long
      ENCRYPTION_KEY: e2e-encryption-key-32-bytes-long-!!!
      JWT_SECRET: e2e-jwt-secret-at-least-32-chars-long
      NODE_ENV: test
      # Enable test-seed endpoints for E2E subscription seeding.
      AEGIS_TEST_SEED: 'true'
      AEGIS_TEST_SECRET: e2e-test-secret
      BASE_URL: http://localhost:5173
      API_BASE_URL: http://localhost:8001
      # Stub out external services in E2E.
      POSTMARK_API_TOKEN: test-postmark-token
      POSTMARK_FROM_EMAIL: test@aegistest.invalid
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run db:migrate

      - name: Start API server (background)
        run: |
          node server/dist/index.js &
          echo $! > /tmp/server.pid
          # Wait for server to be ready.
          timeout 30 bash -c 'until curl -sf http://localhost:8001/api/health; do sleep 1; done'
        env:
          PORT: 8001

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then kill $(cat /tmp/server.pid) || true; fi

  # ── Nightly cross-repo integration (OSS ↔ SaaS Relay) ──────────────────────
  # Scheduled separately — see docs/e2e-test-plan.md for the nightly job config.
  # This job is a placeholder that documents the intent.
  # The real nightly cross-repo run requires checking out both repos and is
  # configured as a separate workflow: .github/workflows/nightly-integration.yml
