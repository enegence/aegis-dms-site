name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: SaaS Release Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis_site_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis_site_test
      SESSION_SECRET: test-session-secret-that-is-long-enough-for-tests
      POSTMARK_API_TOKEN: ""
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      BASE_URL: http://localhost:3000
      PORT: "3001"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
        working-directory: server
      - run: npm run build
        working-directory: web
